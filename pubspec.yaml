name: flutter_application_1
description: "A new Flutter project."

# Prevent the package from being accidentally published to pub.dev
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  path: ^1.8.0 
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.3.1
  image_picker: ^1.1.2
  firebase_storage: ^12.4.1
  share_plus: ^10.1.4
  intl: ^0.20.1
  cached_network_image: ^3.2.3
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/qootlogo.png
    - assets/images/account.png
    - assets/images/calendar.png
    - assets/images/home-button.png
    - assets/images/chiefphoto.png
    - assets/images/nutrition.png
    - assets/images/Flipsnack.jpeg
    - assets/images/plus.png
    - assets/images/ingrediants.png


  fonts:
    - family: Times New Roman
      fonts:
        - asset: assets/fonts/TIMES.TTF
        
        
